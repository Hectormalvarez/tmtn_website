version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 24 || nvm install 24
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*